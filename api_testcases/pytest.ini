[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    P0: 核心冒烟用例
    P1: 重要正向用例
    P2: 异常/边界/鉴权用例
    P3: 安全/性能用例
    smoke: 冒烟测试
    regression: 回归测试
    e2e: 端到端场景
    security: 安全测试
    performance: 性能测试