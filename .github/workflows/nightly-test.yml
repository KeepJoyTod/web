name: Nightly API Test

on:
  schedule:
    # 每天北京时间 20:40 (UTC 12:40) 触发
    - cron: "40 12 * * *"
  # 允许手动触发
  workflow_dispatch:

defaults:
  run:
    working-directory: api_testcases

jobs:
  test-collect:
    name: "Test Collection & Syntax Check"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api_testcases/requirements.txt

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Test Collection (Syntax & Import Validation)
        run: pytest --collect-only --tb=short 2>&1

