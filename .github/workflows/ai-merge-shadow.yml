name: AI Merge Shadow

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  shadow-static-verification:
    name: Shadow static verification
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ''
    steps:
      - name: Checkout merge revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Java 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: back/pom.xml

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            frontend-admin/package-lock.json

      - name: Run deterministic build entrypoint
        run: make build

      - name: Run API test collection diagnostic
        run: make api-test-collect
